<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuliSnack - Dashboard Menük</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="../pics/logo_nobg.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="menus.css" />
    <style>
      #global-alerts {
        position: fixed;
        bottom: 20px;
        left: 88%;
        transform: translateX(-50%);
        z-index: 1050;
        width: 400px;
      }
    </style>
  </head>

  <body>
    <div id="global-alerts"></div>

    <div class="d-flex" style="height: 100vh">
      <div class="sidebar d-flex flex-column p-3">
        <div class="text-center mb-4">
          <img src="../pics/logo.png" class="avatar" />
        </div>
        <nav class="d-flex flex-column gap-2">
          <a class="nav-btn" href="../stats/stats.html">
            <i class="fa-solid fa-chart-line"></i>
            <span>Statisztikák</span>
          </a>
          <a class="nav-btn" href="../orders/orders.html">
            <i class="fa-solid fa-list"></i>
            <span>Rendelések</span>
          </a>
          <a class="nav-btn" href="../products/products.html">
            <i class="fa-solid fa-spoon"></i>
            <span>Termékek</span>
          </a>
          <a class="nav-btn active" href="menus.html">
            <i class="fa-solid fa-utensils"></i>
            <span>Menük</span>
          </a>
        </nav>
        <div class="mt-auto pt-3">
          <button id="logoutBtn" class="btn btn-danger w-100">
            <i class="fa-solid fa-right-from-bracket"></i> Kijelentkezés
          </button>
        </div>
      </div>

      <div class="overflow-auto p-4" style="width: 100vw">
        <div class="container-fluid mt-2">
          <div class="cards-grid">
            <div class="panel-card">
              <div class="panel-header">
                <div class="panel-icon">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ff8c32"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="12" cy="12" r="9" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                  </svg>
                </div>
                <span class="panel-title">Új menü létrehozása</span>
              </div>
              <form class="field-group" id="form">
                <select class="field" id="product1">
                  <option value="" disabled selected>
                    Válaszd az első terméket...
                  </option>
                </select>
                <select class="field" id="product2">
                  <option value="" disabled selected>
                    Válaszd a második terméket...
                  </option>
                </select>
                <input
                  class="field"
                  type="text"
                  placeholder="Név"
                  id="newName"
                />
                <input
                  class="field"
                  type="number"
                  placeholder="Ár (Ft)"
                  id="newPrice"
                />
                <label class="file-label" for="newImage">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#6b7280"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="3" y="3" width="18" height="18" rx="3" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                  </svg>
                  <span id="fileLabel">Kép kiválasztása...</span>
                  <input
                    type="file"
                    id="newImage"
                    accept="image/*"
                    onchange="
                      document.getElementById('fileLabel').textContent =
                        this.files[0]?.name || 'Kép kiválasztása...'
                    "
                  />
                </label>
                <button class="submit-btn btn-create" type="button" id="newBtn">
                  Létrehozás
                </button>
              </form>
            </div>

            <div class="panel-card">
              <div class="panel-header">
                <div class="panel-icon">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ff8c32"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                    />
                    <path
                      d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                    />
                  </svg>
                </div>
                <span class="panel-title">Meglévő menü módosítása</span>
              </div>
              <form class="field-group" id="form2">
                <select class="field" id="changeSelect">
                  <option value="" disabled selected>
                    Válassz menüt módosításhoz...
                  </option>
                </select>
                <input
                  class="field"
                  type="text"
                  placeholder="Név"
                  id="changeName"
                />
                <input
                  class="field"
                  type="number"
                  placeholder="Ár (Ft)"
                  id="changePrice"
                />
              </form>
              <button
                class="submit-btn btn-modify"
                type="button"
                id="changeBtn"
              >
                Módosítás
              </button>
            </div>

            <div class="panel-card panel-card--danger">
              <div class="panel-header">
                <div class="panel-icon panel-icon--danger">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ff3b3b"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6" />
                    <path d="M14 11v6" />
                    <path d="M9 6V4h6v2" />
                  </svg>
                </div>
                <span class="panel-title panel-title--danger"
                  >Meglévő menü törlése</span
                >
              </div>
              <form class="field-group" id="form3">
                <select class="field" id="deleteSelect">
                  <option value="" disabled selected>
                    Válassz menüt törléshez...
                  </option>
                </select>
                <textarea
                  class="field"
                  rows="4"
                  placeholder="Törlés indoka..."
                  id="deleteReason"
                ></textarea>
              </form>
              <button
                class="submit-btn btn-delete"
                type="button"
                id="deleteBtn"
              >
                Törlés
              </button>
            </div>
          </div>

          <div class="mt-5">
            <h3 class="section-title my-4">Menük</h3>
          </div>
        </div>

        <div class="container-fluid text-center" id="result"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menus.js"></script>
  </body>
</html>
