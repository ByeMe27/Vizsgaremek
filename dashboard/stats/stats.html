<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnackSuli - Statisztikák</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="../pics/logo_nobg.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="stats.css" />
  </head>

  <body>
    <div class="d-flex" style="height: 100vh">
      <div class="sidebar d-flex flex-column p-3">
        <div class="text-center mb-4">
          <img src="../pics/logo.png" class="avatar" />
        </div>
        <nav class="d-flex flex-column gap-2">
          <a class="nav-btn active" href="stats.html">
            <i class="fa-solid fa-chart-line"></i>
            <span>Statisztikák</span>
          </a>
          <a class="nav-btn" href="../orders/orders.html">
            <i class="fa-solid fa-list"></i>
            <span>Rendelések</span>
          </a>
          <a class="nav-btn" href="../products/products.html">
            <i class="fa-solid fa-spoon"></i>
            <span>Termékek</span>
          </a>
          <a class="nav-btn" href="../menus/menus.html">
            <i class="fa-solid fa-utensils"></i>
            <span>Menük</span>
          </a>
        </nav>
        <div class="mt-auto pt-3">
          <button id="logoutBtn" class="btn btn-danger w-100">
            <i class="fa-solid fa-right-from-bracket"></i> Kijelentkezés
          </button>
        </div>
      </div>

      <div class="overflow-auto p-4" style="width: 100vw">
        <h3 class="fw-bold mb-4">Statisztikák</h3>

        <div class="stat-grid mb-4">
          <div class="stat-card">
            <div class="stat-icon orange">
              <i class="fa-solid fa-receipt"></i>
            </div>
            <div class="stat-label">Összes rendelés</div>
            <div class="stat-value" id="sc-osszes">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fa-solid fa-coins"></i></div>
            <div class="stat-label">Összes bevétel</div>
            <div class="stat-value" id="sc-bevetel">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue">
              <i class="fa-solid fa-basket-shopping"></i>
            </div>
            <div class="stat-label">Átlagos rendelés</div>
            <div class="stat-value" id="sc-atlag">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon purple">
              <i class="fa-solid fa-trophy"></i>
            </div>
            <div class="stat-label">Top termék</div>
            <div class="stat-value stat-value--sm" id="sc-top">—</div>
          </div>
        </div>

        <div class="charts-row mb-4">
          <div class="chart-card">
            <div class="chart-header">
              <span class="chart-title">Státusz megoszlás</span>
              <span class="chart-badge badge-orange">Rendelések</span>
            </div>
            <canvas id="statusChart" height="220"></canvas>
            <div class="chart-legend" id="statusLegend"></div>
          </div>

          <div class="chart-card">
            <div class="chart-header">
              <span class="chart-title">Legutóbbi visszajelzések</span>
              <span class="chart-badge badge-orange">Visszajelzések</span>
            </div>
            <div class="feedback-list" id="feedbackCards"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="stats.js"></script>
  </body>
</html>
