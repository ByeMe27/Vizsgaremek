<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnackSuli – Termékek</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/x-icon" href="./pics/logo_nobg.png" />
    <link rel="stylesheet" href="./feedback.css" />
  </head>
  <body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
      <a class="navbar-brand" href="#">
        <img src="./pics/logo_nobg.png" alt="logo" />
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse mx-auto" id="mainNav">
        <ul class="navbar-nav mx-auto gap-3">
          <li class="nav-item">
            <a class="nav-link px-3" href="../products/products.html"
              >Termékek</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="../menus/menus.html">Menük</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="../myorders/myorders.html"
              >Rendeléseim</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 active" href="#">Visszajelzés</a>
          </li>
        </ul>
      </div>

      <div class="d-none d-lg-flex align-items-center gap-3">
        <div class="text-end small">
          <div class="fw-semibold">Nyitvatartás:</div>
          <div>H–P: 6:55 – 13:35</div>
        </div>

        <button class="user-btn" id="user-login"></button>
      </div>
    </nav>

    <!-- user popup -->
    <div id="user-popup" class="shadow-sm">
      <div class="fw-bold mb-2 text-center" id="popup-username"></div>
      <button class="btn btn-sm btn-outline-primary w-100 mb-2" id="profile">
        Profil beállítások
      </button>
      <button id="logout-btn" class="btn btn-sm btn-outline-danger w-100">
        Kijelentkezés
      </button>
    </div>

    <div class="container-fluid">
      <div class="row">
        <div
          id="form-col"
          class="col-lg-6 d-flex justify-content-center align-items-center"
        >
          <div id="form-div">
            <h3 class="mb-5 text-center">Nyilvános visszajelzés írása</h3>
            <form>
              <label for="kat_select" class="fs-5"
                >Mivel kapcsolatban írsz? Válassz kategóriát!</label
              >
              <select id="kat_select" class="form-select form-select-lg">
                <option value=""></option>
                <option value="Termék">Termék</option>
                <option value="Kiszolgálás">Kiszolgálás</option>
                <option value="Ár">Ár</option>
                <option value="Egyéb">Egyéb</option></select
              ><br />

              <label for="feedback_szoveg" class="fs-5"
                >Fejtsd ki a véleményed (max 300 karakter)</label
              >
              <textarea
                id="feedback_szoveg"
                class="w-100"
                maxlength="300"
              ></textarea>

              <input
                type="button"
                class="btn btn-dark w-100 my-4"
                id="post_feedback"
                value="Visszajelzés közzététele"
              />
            </form>
            <div role="alert" id="errordiv" hidden></div>
          </div>
        </div>

        <div id="feedbacks-col" class="col-lg-6">
          <!-- feedback kategoria gombok -->
          <div class="d-flex flex-wrap gap-2 my-5 justify-content-center">
            <button
              class="btn category-btn text-white active"
              data-cat="osszes"
            >
              Összes
            </button>
            <button class="btn category-btn text-white" data-cat="Termék">
              Termék
            </button>
            <button class="btn category-btn text-white" data-cat="Kiszolgálás">
              Kiszolgálás
            </button>
            <button class="btn category-btn text-white" data-cat="Ár">
              Ár
            </button>
            <button class="btn category-btn text-white" data-cat="Egyéb">
              Egyéb
            </button>
          </div>

          <!-- feedback kartyak -->
          <div id="feedbacks" class="mt-5 overflow-auto pe-3">
            <div class="d-flex flex-column gap-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- <footer class="footer sticky-bottom">
      <div class="container">
            <hr class="footer-divider">

        <div class="text-center small">
          © 2026 SuliSnack • Minden jog fenntartva
        </div>
      </div>
    </footer> -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./feedback.js"></script>
  </body>
</html>
