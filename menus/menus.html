<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnackSuli - Menük</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="icon" type="image/x-icon" href="./pics/logo_nobg.png" />
    <link rel="stylesheet" href="./menus.css" />
  </head>
  <body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
      <a class="navbar-brand" href="#">
        <img src="./pics/logo_nobg.png" alt="logo" />
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse mx-auto" id="mainNav">
        <ul class="navbar-nav mx-auto gap-3">
          <li class="nav-item">
            <a class="nav-link px-3" href="../products/products.html"
              >Termékek</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link active px-3" href="#">Menük</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="../myorders/myorders.html"
              >Rendeléseim</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="../feedback/feedback.html"
              >Visszajelzés</a
            >
          </li>
        </ul>
      </div>

      <div class="d-none d-lg-flex align-items-center gap-3">
        <div class="text-end small">
          <div class="fw-semibold">Nyitvatartás:</div>
          <div>H–P: 6:55 – 13:35</div>
        </div>

        <button class="user-btn" id="user-login"></button>
      </div>
    </nav>

    <!-- user popup -->
    <div id="user-popup" class="shadow-sm">
      <div class="fw-bold mb-2 text-center" id="popup-username"></div>
      <button class="btn btn-sm btn-outline-primary w-100 mb-2" id="profile">
        Profil beállítások
      </button>
      <button id="logout-btn" class="btn btn-sm btn-outline-danger w-100">
        Kijelentkezés
      </button>
    </div>

    <div class="container-fluid">
      <div class="row">
        <!-- termékek listaja -->
        <div class="col-lg-9 my-3 my-lg-0">
          <div class="shadow-sm rounded-4 p-4">
            <div id="errordiv" hidden></div>
            <div id="menus-container" class="row g-3 overflow-auto"></div>
          </div>
        </div>

        <!-- jobb oldali menu collapse -->
        <div class="col-12 d-lg-none mb-3">
          <button
            class="btn btn-dark w-100 rounded-3"
            data-bs-toggle="collapse"
            data-bs-target="#rightSidebar"
          >
            Kosár megjelenítése
          </button>
        </div>

        <!-- jobb oldali menu -->
        <div class="col-lg-3 collapse d-lg-block" id="rightSidebar">
          <div class="sidebar-card">
            <h5 class="fw-bold">Kosár</h5>

            <!-- overflow-auto -->
            <div id="cart-content" class="mt-3"></div>
            <div id="cart-price"></div>

            <button
              class="btn btn-dark w-100 mt-4 place-order-btn"
              id="place-order"
            >
              Rendelés leadása
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./menus.js"></script>
  </body>
</html>
