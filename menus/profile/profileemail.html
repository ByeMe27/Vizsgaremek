<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnackSuli – Profil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="profile.css" />
    <link rel="icon" type="image/x-icon" href="./pics/logo_nobg.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="sidebar">
        <div class="d-flex justify-content-center align-items-center">
          <img src="./pics/logo.png" class="avatar" />
        </div>

        <nav class="d-flex flex-column gap-2 mt-3">
          <a class="nav-btn" href="./profile.html" data-target="profile">
            <i class="fa-regular fa-address-card"></i> Név
          </a>
          <a class="nav-btn" href="./profileclass.html" data-target="email">
            <i class="fa-regular fa-house"></i> Osztály
          </a>
          <a class="nav-btn active" data-target="email">
            <i class="fa-solid fa-envelope"></i> Email
          </a>
          <a class="nav-btn" href="./profilepasswd.html" data-target="password">
            <i class="fa-solid fa-key"></i> Jelszó
          </a>
        </nav>

        <div class="mt-auto pt-3">
          <a href="../menus.html" class="back-link">⭠ Vissza</a>
        </div>
      </div>

      <div class="main-content">
        <form class="section active content-box" id="emailes">
          <h2>Email módosítása</h2>

          <label>E-mail cím módosítása</label>
          <input
            type="email"
            class="form-control mb-3"
            placeholder="Új email cím megadása"
            required
            id="email"
          />
          <button
            type="button"
            class="btn custom-btn text-light w-100"
            id="changebtn"
          >
            <i class="fa-solid fa-floppy-disk me-2"></i>Mentés
          </button>
        </form>
      </div>
    </div>

    <script src="profileemail.js"></script>
  </body>
</html>
